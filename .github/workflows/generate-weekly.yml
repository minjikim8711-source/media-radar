name: Weekly Media Opportunity Generator

on:
  schedule:
    # 09:00 KST Monday  =  00:00 UTC Monday  (KST is UTC+9)
    - cron: '0 0 * * 1'

  # Allow a manual run from the Actions tab at any time
  workflow_dispatch:

# Grant write access so the bot can commit and push
permissions:
  contents: write

jobs:
  generate:
    name: Generate & commit weekly opportunities
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run opportunity generator
        run: node generate-weekly-opportunities.js

      - name: Commit and push if data changed
        id: commit
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          git add data/weeks/ data/history/

          if git diff --staged --quiet; then
            echo "Nothing changed — skipping commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            DATE=$(date -u +'%Y-%m-%d')
            git commit -m "chore: weekly opportunity update ${DATE} [skip ci]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Vercel redeploy
        if: steps.commit.outputs.changed == 'true' && secrets.VERCEL_DEPLOY_HOOK != ''
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          echo "Vercel redeploy triggered."
